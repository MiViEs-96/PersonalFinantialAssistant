{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2>Accedi</h2>
    <form method="POST">
        <div class="form-group">
            <label for="identifier">Nickname o Nome Completo</label>
            <input type="text" name="identifier" id="identifier" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>
        </div>
        <button type="submit">Entra</button>
    </form>
    <p>Non hai un account? <a href="{{ url_for('auth.register') }}" style="color: var(--accent-color);">Registrati qui</a></p>
{% endblock %}
