{% extends "base.html" %}

{% block title %}Statistiche{% endblock %}

{% block content %}
    <h2>Analisi Spese ed Entrate</h2>

    <div class="nav-links">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('stats') }}">Statistiche</a>
    </div>

    <div style="margin-top: 2rem;">
        <form method="GET" style="display: flex; gap: 1rem; justify-content: center; align-items: flex-end; flex-wrap: wrap;">
            <div class="form-group" style="margin-bottom: 0;">
                <label for="start_date">Da:</label>
                <input type="date" name="start_date" id="start_date" value="{{ start_date }}">
            </div>
            <div class="form-group" style="margin-bottom: 0;">
                <label for="end_date">A:</label>
                <input type="date" name="end_date" id="end_date" value="{{ end_date }}">
            </div>
            <button type="submit" style="width: auto; margin-top: 0; padding: 0.6rem 1.5rem;">Filtra</button>
        </form>
    </div>

    <div style="margin-top: 3rem; display: flex; flex-direction: column; gap: 3rem; align-items: center;">

        <div style="width: 100%; max-width: 400px;">
            <h3>Riepilogo Entrate vs Uscite</h3>
            <canvas id="pieChart"></canvas>
        </div>

        <div style="width: 100%; max-width: 600px;">
            <h3>Dettaglio Entrate per Categoria</h3>
            <canvas id="incomeBarChart"></canvas>
        </div>

        <div style="width: 100%; max-width: 600px;">
            <h3>Dettaglio Uscite per Categoria</h3>
            <canvas id="expenseBarChart"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const chartData = {{ chart_data | tojson }};

        // Pie Chart
        new Chart(document.getElementById('pieChart'), {
            type: 'pie',
            data: {
                labels: chartData.pie_labels,
                datasets: [{
                    data: chartData.pie_data,
                    backgroundColor: ['#28a745', '#dc3545']
                }]
            }
        });

        // Income Bar Chart
        new Chart(document.getElementById('incomeBarChart'), {
            type: 'bar',
            data: {
                labels: chartData.income_bar_labels,
                datasets: [{
                    label: 'Entrate (€)',
                    data: chartData.income_bar_values,
                    backgroundColor: '#28a745'
                }]
            },
            options: {
                scales: { y: { beginAtZero: true } }
            }
        });

        // Expense Bar Chart
        new Chart(document.getElementById('expenseBarChart'), {
            type: 'bar',
            data: {
                labels: chartData.expense_bar_labels,
                datasets: [{
                    label: 'Uscite (€)',
                    data: chartData.expense_bar_values,
                    backgroundColor: '#dc3545'
                }]
            },
            options: {
                scales: { y: { beginAtZero: true } }
            }
        });
    </script>
{% endblock %}
