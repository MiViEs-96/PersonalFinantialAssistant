{% extends "base.html" %}

{% block title %}{{ _('register') }}{% endblock %}

{% block content %}
    <h2>{{ _('create_account') }}</h2>
    <form method="POST">
        <div class="form-group">
            <label for="full_name">{{ _('full_name') }}</label>
            <input type="text" name="full_name" id="full_name" required>
        </div>
        <div class="form-group">
            <label for="nickname">{{ _('nickname') }}</label>
            <input type="text" name="nickname" id="nickname" required>
        </div>
        <div class="form-group">
            <label for="password">{{ _('password') }}</label>
            <input type="password" name="password" id="password" required>
        </div>
        <button type="submit">{{ _('register') }}</button>
    </form>
    <p>{{ _('already_have_account') }} <a href="{{ url_for('auth.login') }}" style="color: var(--accent-color);">{{ _('login_here') }}</a></p>
{% endblock %}
