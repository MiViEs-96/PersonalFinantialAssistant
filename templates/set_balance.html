{% extends "base.html" %}

{% block title %}{{ _('set_initial_balance') }}{% endblock %}
{% block main_class %}auth-container{% endblock %}

{% block content %}
    <div style="background: rgba(220, 53, 69, 0.1); color: #dc3545; padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; border: 1px solid #dc3545;">
        {{ _('error_no_balance') }}
    </div>

    <h2>{{ _('set_initial_balance') }}</h2>
    <form action="{{ url_for('set_initial_balance') }}" method="POST">
        <div class="form-group">
            <label for="balance">{{ _('how_much_money_now') }}</label>
            <input type="number" step="0.01" name="balance" id="balance" placeholder="0.00" required>
        </div>
        <button type="submit" style="width: 100%;">{{ _('add') }}</button>
    </form>
{% endblock %}
